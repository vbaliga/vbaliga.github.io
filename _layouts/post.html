---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  <div class="entry">
    {{ content }}
  </div>
  
  <span>[
  {% for tag in page.tags %}
    {% capture tag_name %}{{ tag }}{% endcapture %}
    <a href="/tag/{{ tag_name }}"><code class="highligher-rouge"><nobr>{{ tag_name }}</nobr></code>&nbsp;</a>
  {% endfor %}
]</span>

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }} by Vikram B. Baliga (<a href="https://github.com/vbaliga">vbaliga</a>).  
  </div>

  {% include disqus.html %}
</article>
