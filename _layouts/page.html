---
layout: default
---

<article class="page">

  <h1>{{ page.title }}</h1>
  
  <div class="tagzz">#tags: 
    {% for tag in page.tags %}
      {% capture tag_name %}{{ tag }}{% endcapture %}
      <a href="/tag/{{ tag_name }}"><code class="highligher-rouge" font-weight=400><nobr>#{{ tag_name }}</nobr></code>&nbsp;</a>
    {% endfor %}
  </div>
  
  <br>

  <div class="entry">
    {{ content }}
  </div>
</article>
